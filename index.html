<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Smart FD Companion — Stable Money prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#3F1F78; --primary-light:#6D3FCB; --primary-soft:#EFE9FB;
    --accent:#B8842E; --accent-soft:#F6EBD7;
    --bg:#FAF7F2; --surface:#FFFFFF;
    --text:#231B2E; --muted:#7A7287; --faint:#A89FB3;
    --success:#1F7A4D; --success-soft:#E5F4EB;
    --danger:#B8412E; --danger-soft:#FBEAE6;
    --warning:#B8842E; --warning-soft:#F6EBD7;
    --border:#EBE5DC;
    --font-display:'Fraunces', Georgia, serif;
    --font-body:'Inter', system-ui, sans-serif;
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); font-family:var(--font-body); color:var(--text);
    display:flex; justify-content:center; padding:24px 12px;
  }
  .phone{
    width:390px; max-width:100%; background:var(--surface); border-radius:36px; overflow:hidden;
    border:8px solid #19131F; box-shadow:0 20px 50px rgba(40,20,60,0.18);
    display:flex; flex-direction:column;
  }
  .statusbar{ display:flex; align-items:center; justify-content:space-between; padding:12px 20px 4px; font-size:12px; font-weight:600; }
  .statusbar .dots{ letter-spacing:1px; }
  .topbar{ display:flex; align-items:center; justify-content:space-between; padding:0 20px 12px; border-bottom:1px solid var(--border); }
  .topbar h1{ font-family:var(--font-display); font-size:19px; font-weight:600; margin:0; }
  .topbar-left{ display:flex; align-items:center; gap:8px; }
  .iconbtn{ background:none; border:none; padding:4px; cursor:pointer; color:var(--primary); display:flex; }
  .screen{ flex:1; overflow-y:auto; max-height:560px; padding:16px 20px 24px; }
  .pill{ font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; display:inline-block; letter-spacing:.2px; }
  .pill-neutral{ background:var(--primary-soft); color:var(--primary); }
  .pill-success{ background:var(--success-soft); color:var(--success); }
  .pill-danger{ background:var(--danger-soft); color:var(--danger); }
  .pill-warning{ background:var(--warning-soft); color:var(--warning); }
  .row{ display:flex; align-items:center; }
  .row-between{ display:flex; align-items:center; justify-content:space-between; }
  .gap2{ gap:8px; } .gap1{ gap:4px; }
  .muted{ color:var(--muted); }
  .balance{ font-family:var(--font-display); font-weight:600; color:var(--text); }
  .card{ border:1px solid var(--border); border-radius:14px; padding:14px; }
  .card-flat{ background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px; }
  .btn-primary{ width:100%; background:var(--primary); color:#fff; border:none; border-radius:10px; padding:12px 0; font-size:13.5px; font-weight:600; cursor:pointer; font-family:var(--font-body); }
  .btn-ghost{ background:none; border:none; color:var(--primary); font-size:12px; font-weight:600; cursor:pointer; padding:0; font-family:var(--font-body); }
  .bottomnav{ display:flex; align-items:center; justify-content:space-around; border-top:1px solid var(--border); padding:8px 0 14px; background:var(--surface); }
  .navitem{ background:none; border:none; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--faint); font-family:var(--font-body); }
  .navitem.active{ color:var(--primary); }
  .navitem span{ font-size:10px; font-weight:600; }
  .actioncard{ width:100%; text-align:left; background:var(--primary); border:none; border-radius:14px; padding:14px 16px; margin-bottom:18px; cursor:pointer; font-family:var(--font-body); }
  .actioncard p{ margin:0; }
  .ladder-wrap{ overflow-x:auto; padding-bottom:4px; background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:14px 10px 10px; }
  .ladder-row{ display:flex; align-items:flex-end; gap:12px; min-height:170px; padding:0 4px; }
  .ladder-step{ background:none; border:none; cursor:pointer; padding:0; display:flex; flex-direction:column; align-items:center; gap:6px; min-width:64px; font-family:var(--font-body); }
  .stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:16px; }
  .ai-toggle{ width:100%; background:var(--primary-soft); border:none; padding:12px 14px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; font-family:var(--font-body); }
  .ai-body{ background:var(--surface); padding:12px 14px; font-size:12.5px; line-height:1.6; }
  .bank-row{ display:flex; align-items:center; justify-content:space-between; border:1px solid var(--border); border-radius:12px; padding:11px 14px; margin-bottom:8px; }
  .bank-row.clickable{ cursor:pointer; background:var(--surface); }
  .toggle{ width:38px; height:22px; border-radius:999px; border:none; cursor:pointer; flex-shrink:0; position:relative; transition:background .15s; }
  .toggle .knob{ width:18px; height:18px; border-radius:50%; background:#fff; position:absolute; top:2px; transition:left .15s; }
  .tenure-chip{ border-radius:10px; padding:9px 13px; font-size:12.5px; font-weight:600; cursor:pointer; font-family:var(--font-body); }
  .bar-track{ height:6px; background:var(--primary-soft); border-radius:4px; }
  .bar-fill{ height:6px; background:var(--primary-light); border-radius:4px; }
  svg.icon{ width:1em; height:1em; display:inline-block; vertical-align:middle; }
  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar">
    <span>9:41</span>
    <span class="dots">●●●●&nbsp;&nbsp;📶&nbsp;&nbsp;🔋</span>
  </div>
  <div id="app"></div>
</div>

<script>
/* ---------- icons (feather-style, MIT) ---------- */
const I = {
  home:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>',
  sparkles:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 4.9L19 9l-5.1 1.9L12 16l-1.9-5.1L5 9l5.1-1.1z"/></svg>',
  pie:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>',
  bell:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>',
  chevronRight:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
  chevronLeft:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>',
  chevronDown:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  check:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  landmark:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12 2 21 7 3 7"/></svg>',
  calendar:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  trending:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
  star:'<svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="0"><polygon points="12 2 15 9 22 9.5 17 14.5 18.5 21.5 12 18 5.5 21.5 7 14.5 2 9.5 9 9"/></svg>',
  alert:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  shield:'<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg>',
};

/* ---------- data ---------- */
const TODAY = new Date('2026-07-01');
function daysBetween(dateStr){ return Math.round((new Date(dateStr)-TODAY)/86400000); }
function fmtINR(n){ return '₹' + Math.round(n).toLocaleString('en-IN'); }
function fmtDate(dateStr){ return new Date(dateStr).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}); }

let fds = [
  { id:'fd2', bank:'Shriram Finance', principal:50000, rate:8.2, maturityDate:'2026-06-28' },
  { id:'fd1', bank:'Bajaj Finance', principal:200000, rate:7.8, maturityDate:'2026-07-06' },
  { id:'fd3', bank:'HDFC Bank', principal:150000, rate:7.0, maturityDate:'2026-08-15' },
  { id:'fd4', bank:'ICICI Bank', principal:300000, rate:7.2, maturityDate:'2026-10-29' },
  { id:'fd5', bank:'SBI', principal:100000, rate:6.8, maturityDate:'2027-04-07' },
];

const banks = [
  { id:'stable-partner', name:'Stable Partner Bank', isPartner:true, rates:{12:8.0,18:8.35,24:8.25,36:8.1} },
  { id:'shriram', name:'Shriram Finance', rates:{12:7.9,18:8.15,24:8.4,36:8.3} },
  { id:'bajaj', name:'Bajaj Finance', rates:{12:7.75,18:7.95,24:8.1,36:8.05} },
  { id:'icici', name:'ICICI Bank', rates:{12:7.0,18:7.2,24:7.1,36:7.05} },
  { id:'hdfc', name:'HDFC Bank', rates:{12:7.1,18:7.05,24:7.0,36:6.95} },
  { id:'sbi', name:'SBI', rates:{12:6.8,18:6.78,24:6.75,36:6.7} },
];

const monthlyData = [
  {month:'Jan',value:3200},{month:'Feb',value:3450},{month:'Mar',value:3800},
  {month:'Apr',value:4100},{month:'May',value:4400},{month:'Jun',value:4950},
];

let alerts = [
  { id:'a1', type:'rate', label:'Notify when any bank crosses 8.5% for 12m+', enabled:true },
  { id:'a2', type:'rate', label:'Notify when Stable Partner Bank rate changes', enabled:true },
  { id:'a3', type:'maturity', label:'Remind me 7 days before any FD matures', enabled:true },
  { id:'a4', type:'maturity', label:'Remind me on the day of maturity', enabled:false },
];

function bestRate(bank){ return Math.max(...Object.values(bank.rates)); }
function bestTenure(bank){ let b=null,bv=-1; for(const [t,r] of Object.entries(bank.rates)){ if(r>bv){bv=r;b=t;} } return Number(b); }

/* ---------- app state ---------- */
let state = { tab:'home', flow:null, aiOpen:false };

function setTab(t){ state.tab=t; state.flow=null; render(); }
function openFlow(fdId, bankId){
  const fd = fds.find(f=>f.id===fdId);
  if(bankId){
    const bank = banks.find(b=>b.id===bankId);
    state.flow = { step:'confirm', fdId, bankId, tenure:bestTenure(bank) };
  } else {
    state.flow = { step:'bank', fdId, bankId:null, tenure:null };
  }
  render();
}
function flowBack(){
  if(!state.flow) return;
  if(state.flow.step==='confirm' && !state.flow.bankId) state.flow=null;
  else if(state.flow.step==='confirm') state.flow.step='bank';
  else state.flow=null;
  render();
}
function pickBank(bankId){
  const bank = banks.find(b=>b.id===bankId);
  state.flow.bankId = bankId;
  state.flow.tenure = bestTenure(bank);
  state.flow.step = 'confirm';
  render();
}
function pickTenure(t){ state.flow.tenure = t; render(); }
function confirmReinvest(){
  const fd = fds.find(f=>f.id===state.flow.fdId);
  const bank = banks.find(b=>b.id===state.flow.bankId);
  const tenure = state.flow.tenure;
  const rate = bank.rates[tenure];
  const principal = fd.principal;
  const interest = Math.round(principal*(fd.rate/100));
  const amount = principal+interest;
  const projected = Math.round(amount*(1+(rate/100)*(tenure/12)));

  fds = fds.filter(f=>f.id!==fd.id);
  const maturityDate = new Date(TODAY);
  maturityDate.setMonth(maturityDate.getMonth()+tenure);
  fds.push({ id:fd.id+'-r', bank:bank.name, principal:amount, rate, maturityDate:maturityDate.toISOString().slice(0,10) });

  state.flow = { step:'success', fdId:fd.id, bankId:bank.id, tenure, rate, amount, projected, bankName:bank.name };
  render();
}
function toggleAlert(id){ alerts = alerts.map(a=> a.id===id ? {...a, enabled:!a.enabled} : a); render(); }
function toggleAI(){ state.aiOpen = !state.aiOpen; render(); }

/* ---------- screen builders ---------- */
function pill(text, tone='neutral'){ return `<span class="pill pill-${tone}">${text}</span>`; }

function ladderHTML(){
  const sorted = [...fds].sort((a,b)=> new Date(a.maturityDate)-new Date(b.maturityDate));
  const maxDays = Math.max(...sorted.map(f=>Math.max(daysBetween(f.maturityDate),1)));
  const steps = sorted.map(fd=>{
    const days = daysBetween(fd.maturityDate);
    const urgent = days<=7, soon = days>7 && days<=60;
    const h = Math.max(34, Math.round((Math.max(days,1)/maxDays)*130));
    const barColor = urgent? 'var(--danger)' : soon? 'var(--accent)' : 'var(--primary-light)';
    const softColor = urgent? 'var(--danger-soft)' : soon? 'var(--warning-soft)' : 'var(--primary-soft)';
    const label = days<0 ? 'matured' : days===0 ? 'today' : days+'d';
    return `<button class="ladder-step" onclick="openFlow('${fd.id}')">
      <div style="font-size:10px;font-weight:600;color:var(--muted);white-space:nowrap;">${fmtINR(fd.principal).replace('₹','')}</div>
      <div style="width:48px;height:${h}px;border-radius:8px 8px 4px 4px;background:${softColor};border:1.5px solid ${barColor};display:flex;align-items:flex-start;justify-content:center;padding-top:6px;">
        <div style="width:16px;height:16px;border-radius:50%;background:${barColor};"></div>
      </div>
      <div style="font-size:10.5px;font-weight:600;color:var(--text);text-align:center;line-height:1.3;">${fd.bank.split(' ')[0]}</div>
      <div style="font-size:9.5px;font-weight:600;color:${days<0?'var(--danger)':'var(--muted)'};">${label}</div>
    </button>`;
  }).join('');
  return `<div class="ladder-wrap"><div class="ladder-row">${steps}</div></div>`;
}

function homeScreen(){
  const totalInvested = fds.reduce((s,f)=>s+f.principal,0);
  const needsAction = fds.filter(f=>daysBetween(f.maturityDate)<=7);
  const avgRate = (fds.reduce((s,f)=>s+f.rate,0)/fds.length).toFixed(2);
  const nextMaturity = [...fds].sort((a,b)=> new Date(a.maturityDate)-new Date(b.maturityDate))[0];
  const hasMatured = fds.some(f=>daysBetween(f.maturityDate)<0);

  let actionCard = '';
  if(needsAction.length>0){
    const sub = hasMatured ? 'One has already matured' : `Matures in ${daysBetween(needsAction[0].maturityDate)} days`;
    actionCard = `<button class="actioncard" onclick="setTab('next')">
      <div class="row-between">
        <div class="row gap2">${I.alert}<span style="color:#fff;font-size:13.5px;font-weight:600;">${needsAction.length} FD${needsAction.length>1?'s':''} need${needsAction.length===1?'s':''} attention</span></div>
        ${I.chevronRight.replace('currentColor','#fff')}
      </div>
      <p style="color:#D9CCF3;font-size:12px;margin-top:4px;">${sub} — see your options</p>
    </button>`;
  }

  return `
    <p class="muted" style="font-size:13px;margin:0 0 2px;">Good afternoon, Mehul</p>
    <div class="row-between" style="align-items:flex-end;margin-bottom:18px;">
      <div>
        <div class="balance" style="font-size:30px;line-height:1.1;">${fmtINR(totalInvested)}</div>
        <p class="muted" style="font-size:12.5px;margin:2px 0 0;">across ${fds.length} fixed deposits</p>
      </div>
      ${pill('avg '+avgRate+'% p.a.','success')}
    </div>
    ${actionCard}
    <div class="row-between" style="margin-bottom:10px;">
      <span style="font-size:13px;font-weight:600;">Your FD ladder</span>
      <span style="font-size:11px;color:var(--faint);">tap a step</span>
    </div>
    ${ladderHTML()}
    <div class="stat-grid">
      <div class="card-flat">
        ${I.calendar.replace('currentColor','var(--primary)')}
        <p class="muted" style="font-size:11px;margin:8px 0 1px;">Next maturity</p>
        <p style="font-size:13.5px;font-weight:600;margin:0;">${fmtDate(nextMaturity.maturityDate)}</p>
      </div>
      <div class="card-flat">
        ${I.trending.replace('currentColor','var(--primary)')}
        <p class="muted" style="font-size:11px;margin:8px 0 1px;">This month's interest</p>
        <p style="font-size:13.5px;font-weight:600;margin:0;">${fmtINR(4950)}</p>
      </div>
    </div>
    <button class="actioncard" style="background:var(--accent-soft);margin-top:12px;margin-bottom:0;" onclick="setTab('snapshot')">
      <div class="row-between">
        <span style="font-size:13px;font-weight:600;color:#5E4313;">View your monthly wealth snapshot</span>
        ${I.chevronRight.replace('currentColor','#5E4313')}
      </div>
    </button>
  `;
}

function aiHTML(){
  return `<div style="border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;">
    <button class="ai-toggle" onclick="toggleAI()">
      <div class="row gap2">${I.sparkles.replace('currentColor','var(--primary)')}<span style="font-size:13px;font-weight:600;color:var(--primary);">Ask Stable AI: reinvest or withdraw?</span></div>
      <span style="transform:rotate(${state.aiOpen?180:0}deg);transition:transform .2s;display:flex;">${I.chevronDown.replace('currentColor','var(--primary)')}</span>
    </button>
    ${state.aiOpen ? `<div class="ai-body">Reinvesting keeps your money compounding and current FD rates are higher than a year ago, so it's usually the stronger move if you don't need the cash.
      Withdraw instead if you'll need this money within the next 6 months — breaking a fresh FD early costs you a penalty.
      On tax: interest above ₹40,000 a year (₹50,000 for seniors) gets TDS deducted at 10%, so plan for that at filing time.</div>` : ''}
  </div>`;
}

function nextScreen(){
  const actionable = fds.filter(f=>daysBetween(f.maturityDate)<=30).sort((a,b)=>daysBetween(a.maturityDate)-daysBetween(b.maturityDate));
  const sortedBanks = [...banks].sort((a,b)=>bestRate(b)-bestRate(a));

  let actionCards = '';
  if(actionable.length>0){
    actionCards = `<p style="font-size:13px;font-weight:600;margin:0 0 10px;">Needs your decision</p>` +
      actionable.map(fd=>{
        const days = daysBetween(fd.maturityDate);
        const tone = days<0?'danger':days<=7?'warning':'neutral';
        const label = days<0?'matured':days===0?'matures today':`${days} days left`;
        return `<div class="card" style="margin-bottom:12px;">
          <div class="row-between" style="margin-bottom:6px;">
            <div class="row gap2">${I.landmark.replace('currentColor','var(--primary)')}<span style="font-size:13.5px;font-weight:600;">${fd.bank}</span></div>
            ${pill(label,tone)}
          </div>
          <p class="muted" style="font-size:12px;margin:0 0 12px;">${fmtINR(fd.principal)} at ${fd.rate}% · maturity value ${fmtINR(fd.principal*(1+fd.rate/100))}</p>
          <button class="btn-primary" onclick="openFlow('${fd.id}')">See reinvestment options</button>
        </div>`;
      }).join('');
  }

  const bankRows = sortedBanks.map(b=>{
    const targetFd = actionable[0] || fds[0];
    return `<div class="bank-row">
      <div>
        <div class="row gap1"><span style="font-size:13px;font-weight:600;">${b.name}</span>${b.isPartner?I.star.replace('currentColor','var(--accent)'):''}</div>
        <p class="muted" style="font-size:11px;margin:2px 0 0;">best at ${bestTenure(b)} months</p>
      </div>
      <div style="text-align:right;">
        <p style="font-size:14.5px;font-weight:700;color:var(--success);margin:0;">${bestRate(b)}%</p>
        <button class="btn-ghost" onclick="openFlow('${targetFd.id}','${b.id}')">Reinvest →</button>
      </div>
    </div>`;
  }).join('');

  return `${aiHTML()}${actionCards}
    <p style="font-size:13px;font-weight:600;margin:20px 0 10px;">Best rates to reinvest into</p>
    ${bankRows}`;
}

function snapshotScreen(){
  const thisMonth = monthlyData[monthlyData.length-1].value;
  const lastMonth = monthlyData[monthlyData.length-2].value;
  const pctChange = (((thisMonth-lastMonth)/lastMonth)*100).toFixed(1);
  const breakdown = [
    {bank:'ICICI Bank',value:1800},{bank:'Bajaj Finance',value:1560},{bank:'HDFC Bank',value:875},
    {bank:'SBI',value:567},{bank:'Shriram Finance',value:148},
  ];
  const maxB = Math.max(...breakdown.map(b=>b.value));

  const w=320,h=140,pad=8;
  const maxV = Math.max(...monthlyData.map(d=>d.value));
  const minV = Math.min(...monthlyData.map(d=>d.value));
  const stepX = (w-2*pad)/(monthlyData.length-1);
  const pts = monthlyData.map((d,i)=>{
    const x = pad+i*stepX;
    const y = h-pad-((d.value-minV)/(maxV-minV||1))*(h-2*pad-20)-10;
    return [x,y];
  });
  const linePath = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
  const areaPath = linePath + ` L${pts[pts.length-1][0].toFixed(1)},${h-pad} L${pts[0][0].toFixed(1)},${h-pad} Z`;
  const labels = monthlyData.map((d,i)=>`<text x="${pts[i][0]}" y="${h-2}" font-size="10" fill="var(--muted)" text-anchor="middle" font-family="Inter">${d.month}</text>`).join('');
  const dots = pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="var(--primary)"></circle>`).join('');

  const chart = `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:160px;">
    <defs><linearGradient id="fillArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="5%" stop-color="var(--primary-light)" stop-opacity="0.35"/>
      <stop offset="95%" stop-color="var(--primary-light)" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#fillArea)" stroke="none"></path>
    <path d="${linePath}" fill="none" stroke="var(--primary)" stroke-width="2"></path>
    ${dots}${labels}
  </svg>`;

  const breakdownRows = breakdown.map(b=>`
    <div style="margin-bottom:10px;">
      <div class="row-between" style="margin-bottom:4px;">
        <span style="font-size:12.5px;">${b.bank}</span>
        <span style="font-size:12.5px;font-weight:600;">${fmtINR(b.value)}</span>
      </div>
      <div class="bar-track"><div class="bar-fill" style="width:${(b.value/maxB)*100}%;"></div></div>
    </div>`).join('');

  return `
    <p class="muted" style="font-size:12.5px;margin:0 0 2px;">June 2026</p>
    <div class="row" style="align-items:flex-end;gap:8px;margin-bottom:4px;">
      <span class="balance" style="font-size:26px;">${fmtINR(thisMonth)}</span>
      <span class="muted" style="font-size:12px;margin-bottom:4px;">earned in interest</span>
    </div>
    ${pill('+'+pctChange+'% vs May','success')}
    <div style="margin-top:18px;margin-bottom:8px;">${chart}</div>
    <p style="font-size:13px;font-weight:600;margin:18px 0 10px;">Where it came from</p>
    ${breakdownRows}
  `;
}

function alertsScreen(){
  const rateAlerts = alerts.filter(a=>a.type==='rate');
  const maturityAlerts = alerts.filter(a=>a.type==='maturity');
  const row = a => `<div class="row-between" style="border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;">
    <span style="font-size:12.5px;padding-right:12px;line-height:1.4;">${a.label}</span>
    <button class="toggle" style="background:${a.enabled?'var(--primary)':'var(--border)'};" onclick="toggleAlert('${a.id}')">
      <div class="knob" style="left:${a.enabled?'18px':'2px'};"></div>
    </button>
  </div>`;

  return `
    <div class="row gap2" style="margin-bottom:10px;">${I.bell.replace('currentColor','var(--primary)')}<p style="font-size:13px;font-weight:600;margin:0;">Rate alerts</p></div>
    ${rateAlerts.map(row).join('')}
    <div class="row gap2" style="margin:20px 0 10px;">${I.calendar.replace('currentColor','var(--primary)')}<p style="font-size:13px;font-weight:600;margin:0;">Maturity reminders</p></div>
    ${maturityAlerts.map(row).join('')}
    <button style="width:100%;margin-top:8px;border:1px dashed var(--primary-light);background:none;border-radius:12px;padding:12px 0;color:var(--primary);font-size:12.5px;font-weight:600;cursor:pointer;font-family:var(--font-body);">+ Add a custom alert</button>
  `;
}

function reinvestFlowScreen(){
  const flow = state.flow;
  const fd = fds.find(f=>f.id===flow.fdId) || { bank:flow.fdId, principal:0, rate:0 };
  const principal = fd.principal;
  const interest = Math.round(principal*(fd.rate/100));
  const maturityValue = principal+interest;

  if(flow.step==='bank'){
    const sortedBanks = [...banks].sort((a,b)=>bestRate(b)-bestRate(a));
    const rows = sortedBanks.map(b=>`
      <button class="bank-row clickable" onclick="pickBank('${b.id}')">
        <div>
          <div class="row gap1"><span style="font-size:13px;font-weight:600;">${b.name}</span>${b.isPartner?pill('partner'):''}</div>
          <p class="muted" style="font-size:11px;margin:2px 0 0;">best at ${bestTenure(b)} months</p>
        </div>
        <div class="row gap2"><span style="font-size:15px;font-weight:700;color:var(--success);">${bestRate(b)}%</span>${I.chevronRight.replace('currentColor','var(--faint)')}</div>
      </button>`).join('');
    return `
      <div style="background:var(--primary-soft);border-radius:12px;padding:12px;margin-bottom:16px;">
        <p style="font-size:11px;color:var(--primary);margin:0;font-weight:600;">REINVESTING</p>
        <p style="font-size:13.5px;margin:3px 0 0;">${fmtINR(maturityValue)} from ${fd.bank}</p>
      </div>
      <p class="muted" style="font-size:12.5px;margin:0 0 12px;">Choose a bank — sorted by best available rate</p>
      ${rows}
    `;
  }

  if(flow.step==='confirm'){
    const bank = banks.find(b=>b.id===flow.bankId);
    const tenureOptions = Object.keys(bank.rates).map(Number).sort((a,b)=>a-b);
    const tenure = flow.tenure;
    const rate = bank.rates[tenure];
    const projected = Math.round(maturityValue*(1+(rate/100)*(tenure/12)));
    const chips = tenureOptions.map(t=>{
      const active = tenure===t;
      return `<button class="tenure-chip" style="border:1.5px solid ${active?'var(--primary)':'var(--border)'};background:${active?'var(--primary-soft)':'var(--surface)'};color:${active?'var(--primary)':'var(--text)'};" onclick="pickTenure(${t})">${t}m · ${bank.rates[t]}%</button>`;
    }).join('');
    return `
      <div class="card" style="margin-bottom:16px;">
        <div class="row gap2" style="margin-bottom:4px;">${I.landmark.replace('currentColor','var(--primary)')}<span style="font-size:14px;font-weight:600;">${bank.name}</span>${bank.isPartner?pill('partner'):''}</div>
        <p class="muted" style="font-size:12px;margin:0;">Investing ${fmtINR(maturityValue)}</p>
      </div>
      <p style="font-size:12.5px;font-weight:600;margin:0 0 8px;">Choose tenure</p>
      <div class="row gap2" style="margin-bottom:18px;flex-wrap:wrap;">${chips}</div>
      <div style="background:var(--primary-soft);border-radius:12px;padding:14px;margin-bottom:18px;">
        <div class="row-between" style="margin-bottom:6px;"><span class="muted" style="font-size:12px;">Principal</span><span style="font-size:12.5px;font-weight:600;">${fmtINR(maturityValue)}</span></div>
        <div class="row-between" style="margin-bottom:6px;"><span class="muted" style="font-size:12px;">Rate · tenure</span><span style="font-size:12.5px;font-weight:600;">${rate}% · ${tenure} months</span></div>
        <div class="row-between" style="border-top:1px solid #DDD0F4;margin-top:8px;padding-top:8px;"><span style="font-size:12.5px;font-weight:600;color:var(--primary);">Maturity value</span><span style="font-size:16px;font-weight:700;color:var(--primary);">${fmtINR(projected)}</span></div>
      </div>
      <button class="btn-primary" onclick="confirmReinvest()">Confirm reinvestment</button>
    `;
  }

  if(flow.step==='success'){
    return `
      <div style="display:flex;flex-direction:column;align-items:center;text-align:center;padding-top:24px;">
        <div style="width:56px;height:56px;border-radius:50%;background:var(--success-soft);display:flex;align-items:center;justify-content:center;margin-bottom:16px;">
          ${I.check.replace('currentColor','var(--success)')}
        </div>
        <h2 style="font-family:var(--font-display);font-size:19px;font-weight:600;margin:0 0 6px;">FD booked</h2>
        <p class="muted" style="font-size:13px;margin:0 0 24px;max-width:260px;">${fmtINR(flow.amount)} reinvested with ${flow.bankName} at ${flow.rate}% for ${flow.tenure} months. Maturity value ${fmtINR(flow.projected)}.</p>
        <button class="btn-primary" style="width:auto;padding:12px 28px;" onclick="state.flow=null;render();">Back to dashboard</button>
      </div>
    `;
  }
}

/* ---------- top-level render ---------- */
const titles = { home:'Stable Money', next:'What next', snapshot:'Wealth snapshot', alerts:'Alerts' };

function render(){
  const app = document.getElementById('app');
  let topbar, body, nav='';

  if(state.flow){
    const showBack = state.flow.step!=='success';
    topbar = `<div class="topbar">
      <div class="topbar-left">
        ${showBack? `<button class="iconbtn" onclick="flowBack()">${I.chevronLeft}</button>` : ''}
        <h1>${state.flow.step==='success'?'Done':'Reinvest'}</h1>
      </div>
    </div>`;
    body = reinvestFlowScreen();
  } else {
    topbar = `<div class="topbar">
      <div class="topbar-left"><h1>${titles[state.tab]}</h1></div>
      ${state.tab==='home'? `<span style="color:var(--primary);display:flex;">${I.shield}</span>` : ''}
    </div>`;
    if(state.tab==='home') body = homeScreen();
    else if(state.tab==='next') body = nextScreen();
    else if(state.tab==='snapshot') body = snapshotScreen();
    else if(state.tab==='alerts') body = alertsScreen();

    nav = `<div class="bottomnav">
      ${['home','next','snapshot','alerts'].map(id=>{
        const icons={home:I.home,next:I.sparkles,snapshot:I.pie,alerts:I.bell};
        const labels={home:'Home',next:'What next',snapshot:'Snapshot',alerts:'Alerts'};
        const active = state.tab===id;
        return `<button class="navitem ${active?'active':''}" onclick="setTab('${id}')">${icons[id]}<span>${labels[id]}</span></button>`;
      }).join('')}
    </div>`;
  }

  app.innerHTML = `${topbar}<div class="screen">${body}</div>${nav}`;
}

render();
</script>
</body>
</html>
